<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DoomScroll Diary</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <section id="login-section">
        <div class="login-card">

            <div class="diary-cover">
                <h1>DoomScroll <span style="opacity:0.85;">Diary</span></h1>
                <p class="subtitle">my private diary — keep out!!</p>
                <div class="diary-strap">
                    <span class="lock-icon">🔒</span>
                </div>
            </div>

            <div class="diary-pages">
                <form id="login-form">
                    <input type="text" id="username-input" placeholder="name..." required />
                    <input type="password" id="password-input" placeholder="secret password..." required />
                    <button type="submit">unlock ✦</button>
                </form>
                <p id="login-error" class="error-text"></p>
                <p style="margin-top:16px; font-size:1rem; color:#d4a0b8; font-style:italic; text-align:center;">
                    <a href="home.html" style="color:#c2185b; text-decoration:none;">[ dev: skip login ]</a>
                </p>
            </div>

        </div>
    </section>

    <script>
        // backend dev: replace this with a real API call to validate credentials
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault();
            const username = document.getElementById("username-input").value.trim();
            const password = document.getElementById("password-input").value.trim();
            if (!username || !password) return;
            // TODO: validate against backend, then redirect on success
            window.location.href = "home.html";
        });
    </script>

</body>
</html>
