<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DoomScroll Debug</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <!-- LOGIN -->
    <section id="login-section">
        <div class="login-card">
            <h1>DoomScroll <span class="accent">Debug</span></h1>
            <p class="subtitle">Track. Reflect. Break the loop.</p>
            <form id="login-form">
                <input type="text" id="username-input" placeholder="Username" required />
                <input type="password" id="password-input" placeholder="Password" required />
                <button type="submit">Log In</button>
            </form>
            <p id="login-error" class="error-text"></p>
            <p style="margin-top:20px; font-size:0.78rem; color:#3d4260;">
                <a href="home.html" style="color:#5bb8ff; text-decoration:none;">[ dev: skip login ]</a>
            </p>
        </div>
    </section>

    <!-- APP (hidden until login) -->
    <div id="app" class="hidden">

        <header>
            <span class="logo">DoomScroll <span class="accent">Debug</span></span>
            <nav>
                <button class="nav-btn active" data-target="goals-section">Goals & Streaks</button>
                <button class="nav-btn" data-target="screentime-section">Screen Time</button>
                <button class="nav-btn" data-target="journal-section">Journal</button>
            </nav>
            <button id="logout-btn">Logout</button>
        </header>

        <main>

            <!-- GOALS & STREAKS -->
            <section id="goals-section" class="view">
                <h2>Goals & Streaks</h2>
                <div class="card streak-card">
                    <div class="streak-number" id="streak-count">0</div>
                    <div class="streak-label">day streak</div>
                </div>
                <div class="card">
                    <h3>My Goals</h3>
                    <ul id="goals-list"></ul>
                    <form id="goal-form">
                        <input type="text" id="goal-input" placeholder="Add a new goal..." />
                        <button type="submit">Add</button>
                    </form>
                </div>
            </section>

            <!-- SCREEN TIME LOG -->
            <section id="screentime-section" class="view hidden">
                <h2>Screen Time Log</h2>
                <div class="card">
                    <form id="log-form">
                        <input type="text" id="log-app" placeholder="App / Site (e.g. TikTok)" />
                        <input type="number" id="log-minutes" placeholder="Minutes spent" min="1" />
                        <button type="submit">Log It</button>
                    </form>
                </div>
                <div id="log-list"></div>
            </section>

            <!-- JOURNAL -->
            <section id="journal-section" class="view hidden">
                <h2>Journal</h2>
                <div class="card">
                    <form id="journal-form">
                        <textarea id="journal-input" placeholder="How did scrolling make you feel today?"></textarea>
                        <button type="submit">Save Entry</button>
                    </form>
                </div>
                <div id="journal-list"></div>
            </section>

        </main>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
